name: PitWall AI — Automated Race Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 16 * * 6'   # Saturday 16:00 UTC — after qualifying
    - cron: '0 20 * * 0'   # Sunday 20:00 UTC — after race
    - cron: '0 8 * * 1'    # Monday 08:00 UTC — weekly digest
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'auto'
        type: choice
        options: [auto, predict, after_race, retrain, full_update, send_emails]

jobs:

  saturday_predict:
    name: Saturday — Qualifying + Prediction
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 16 * * 6') ||
      github.event.inputs.action == 'predict' ||
      github.event.inputs.action == 'full_update'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt
      - run: python setup.py
      - run: python predict.py auto
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit prediction
        run: |
          git config user.email "pitwall-bot@github.com"
          git config user.name "PitWall Bot"
          git add data/latest_prediction.json || true
          git diff --staged --quiet || git commit -m "🏎️ Saturday prediction — $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sunday_after_race:
    name: Sunday — Results + Retrain + Emails
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0') ||
      github.event.inputs.action == 'after_race' ||
      github.event.inputs.action == 'full_update'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt
      - run: python setup.py
      - name: Run post-race pipeline
        run: python scheduler.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      - name: Retrain model
        run: |
          python ingestion/run_ingestion.py --features
          python src/train_model.py
      - name: Commit updated data
        run: |
          git config user.email "pitwall-bot@github.com"
          git config user.name "PitWall Bot"
          git add data/ models/model_meta.json || true
          git diff --staged --quiet || git commit -m "🏁 Post-race update — $(date +'%Y-%m-%d')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt fastapi uvicorn pytest httpx
      - run: python setup.py
      - name: API + prediction test
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from api.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200, 'Health check failed'
          r2 = client.get('/api/prediction/Japanese Grand Prix?weather=Dry')
          assert r2.status_code == 200, 'Prediction failed'
          print(f'Winner: {r2.json()[\"winner\"][\"driver\"]}')
          print('All tests passed')
          "

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        continue-on-error: true
      - name: Deploy
        run: |
          echo "Deployed to sportsbrainai.pro"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
